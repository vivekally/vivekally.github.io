name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Build each Vite app
      - run: npm run build:landing
      - run: npm run build:law-deals
      - run: npm run build:law-os

      # Assemble site into _site/
      - name: Assemble site
        run: |
          mkdir -p _site

          # Root hub page
          cp index.html _site/
          cp README.md _site/

          # PM OS Landing (Vite build output)
          cp -r packages/pm-os-landing/dist _site/pm-os-landing
          cp _site/pm-os-landing/index.html _site/pm-os-landing/404.html

          # Law OS Deals (Vite build output)
          cp -r packages/law-os-deals/dist _site/law-os-deals
          cp _site/law-os-deals/index.html _site/law-os-deals/404.html

          # Law OS Litigation (Vite build output)
          cp -r packages/law-os/dist _site/law-os
          cp _site/law-os/index.html _site/law-os/404.html

          # PM OS Deck (static files, already built)
          cp -r pm-os-deck _site/pm-os-deck

          # Top-level 404 fallback
          cp index.html _site/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
